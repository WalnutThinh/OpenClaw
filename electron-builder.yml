appId: com.enchante.openclaw
productName: OpenClaw
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
extraResources:
  # Windows: `npm run build` runs regenerate-icons — uses resources/openclaw-logo.ico when present, else SVG → build/icon.ico
  - from: build/icon.ico
    to: app.ico
  - from: skill
    to: skill
    filter:
      - '**/*'
win:
  icon: build/icon.ico
  # Matches package.json semver (e.g. 1.1.2 → OpenClaw-1.1.2-win.zip). Use x.y.z, not x.y.0z.
  artifactName: ${productName}-${version}-win.${ext}
  executableName: OpenClaw
  # Shown in .exe Properties / Version; firewall “Publisher” uses Authenticode when you code-sign.
  legalTrademarks: Enchante Direction
  forceCodeSigning: false
  requestedExecutionLevel: asInvoker
  # Ship full app as .zip; custom OPENCLAW-setup.exe is built separately (setup-bootstrapper/).
  target:
    - target: zip
      arch:
        - x64
mac:
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: true
  target:
    - target: dmg
      arch:
        - universal
dmg:
  artifactName: ${name}.${ext}
  title: ${productName}
  background: build/background.png
  iconSize: 80
  window:
    width: 540
    height: 380
  contents:
    - x: 144
      y: 178
    - x: 396
      y: 178
      type: link
      path: /Applications
npmRebuild: false
